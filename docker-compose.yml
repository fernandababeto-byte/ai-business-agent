services:
  api:
    build: .
    container_name: ai_business_api

    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    env_file:
      - .env

  dashboard:
    build: .

    container_name: ai_business_dashboard

    command: streamlit run dashboard/app.py --server.address=0.0.0.0 --server.port=8501

    ports:
      - "8501:8501"

    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      - api